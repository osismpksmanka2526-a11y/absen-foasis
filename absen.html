<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi OSIS & MPK + Scan QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fe;
            color: #333;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .btn-primary {
            background-color: #4e73df;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: #2e59d9;
            transform: translateY(-2px);
        }
        .table-responsive {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        /* Style untuk area kamera scanner */
        #reader {
            border: 2px dashed #4e73df !important;
            border-radius: 15px;
            overflow: hidden;
            background: #fff;
        }
        #reader__dashboard_section_csr button {
            background-color: #4e73df !important;
            color: white !important;
            border: none !important;
            padding: 6px 12px !important;
            border-radius: 5px !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-qr-code-scan me-2"></i>KEHADIRAN OSIS MPK</a>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card p-4 mb-4">
                    <h5 class="mb-3 fw-bold text-dark"><i class="bi bi-camera me-2 text-primary"></i>Scan Barcode / QR Code</h5>
                    <div id="reader" class="w-100"></div>
                    <div class="mt-2 text-center text-muted small">
                        Arahkan QR Code panitia (Format: Nama - Jabatan) ke kamera.
                    </div>
                </div>

                <div class="card p-4">
                    <h5 class="mb-4 fw-bold text-dark"><i class="bi bi-pencil-square me-2 text-primary"></i>Data Kehadiran</h5>
                    <form id="formAbsen">
                        <div class="mb-3">
                            <label for="nama" class="form-label fw-semibold">Nama Lengkap</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="nama" placeholder="Masukkan nama atau scan QR" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="jabatan" class="form-label fw-semibold">Jabatan / Organisasi</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-briefcase"></i></span>
                                <select class="form-select" id="jabatan" required>
                                    <option value="" disabled selected>Pilih Jabatan...</option>
                                    <option value="Ketua OSIS">Ketua OSIS</option>
                                    <option value="Wakil Ketua OSIS">Wakil Ketua OSIS</option>
                                    <option value="Koordinator Sekbid">Koordinator Sekbid</option>
                                    <option value="Anggota Sekbid">Anggota Sekbid</option>
                                    <option value="Ketua MPK">Ketua MPK</option>
                                    <option value="Wakil Ketua MPK">Wakil Ketua MPK</option>
                                    <option value="Koordinator Komisi">Koordinator Komisi</option>
                                    <option value="Anggota Komisi">Anggota Komisi</option>

                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="waktu" class="form-label fw-semibold">Waktu Hadir</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-clock"></i></span>
                                <input type="text" class="form-control" id="waktu" readonly>
                            </div>
                        </div>

                        <button type="submit" id="btnSubmit" class="btn btn-primary w-100"><i class="bi bi-check-circle me-2"></i>Kirim Kehadiran</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="table-responsive">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="fw-bold m-0 text-dark">Daftar Kehadiran Hari Ini</h4>
                        <span class="badge bg-success" id="totalHadir">0 Hadir</span>
                    </div>
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" style="width: 10%">No</th>
                                <th scope="col" style="width: 45%">Nama</th>
                                <th scope="col" style="width: 25%">Jabatan</th>
                                <th scope="col" style="width: 20%">Waktu</th>
                            </tr>
                        </thead>
                        <tbody id="tabelData">
                            <tr id="placeholderRow">
                                <td colspan="4" class="text-center text-muted py-4">Belum ada data kehadiran. Silakan scan atau isi form.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <script>
        // 1. Update Jam Otomatis
        function updateJam() {
            const sekarang = new Date();
            const opsi = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('waktu').value = sekarang.toLocaleTimeString('id-ID', opsi) + ' WIB';
        }
        setInterval(updateJam, 1000);
        updateJam();

        let counter = 0;
        let lastScannedText = ""; // Mencegah double scan berturut-turut dalam waktu singkat

        // 2. Fungsi Tambah Data ke Tabel
        function tambahAbsen(nama, jabatan, waktu) {
            const placeholder = document.getElementById('placeholderRow');
            if (placeholder) placeholder.remove();

            counter++;
            const tabel = document.getElementById('tabelData');
            const barisBaru = `
                <tr>
                    <td><strong>${counter}</strong></td>
                    <td class="fw-semibold">${nama}</td>
                    <td><span class="badge bg-secondary">${jabatan}</span></td>
                    <td class="text-muted">${waktu}</td>
                </tr>
            `;
            tabel.innerHTML += barisBaru;
            document.getElementById('totalHadir').innerText = `${counter} Hadir`;
            
            // Mainkan suara beep
            document.getElementById('beepSound').play().catch(e => console.log("Audio play blocked"));
        }

        // 3. Event Form Manual Submit
        document.getElementById('formAbsen').addEventListener('submit', function(e) {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            const jabatan = document.getElementById('jabatan').value;
            const waktu = document.getElementById('waktu').value;

            tambahAbsen(nama, jabatan, waktu);

            // Reset form
            document.getElementById('nama').value = '';
            document.getElementById('jabatan').selectedIndex = 0;
        });

        // 4. Inisialisasi Scanner Kamera
        function onScanSuccess(decodedText, decodedResult) {
            // Cek jika teks yang sama di-scan berulang kali dengan cepat
            if (decodedText === lastScannedText) return; 
            
            lastScannedText = decodedText;
            // Set waktu tunggu 3 detik sebelum bisa scan teks yang sama lagi
            setTimeout(() => { lastScannedText = ""; }, 3000); 

            // Format ideal: "Nama Lengkap - Jabatan"
            if (decodedText.includes(" - ")) {
                const bagian = decodedText.split(" - ");
                const namaScan = bagian[0].trim();
                const jabatanScan = bagian[1].trim();
                const waktuScan = document.getElementById('waktu').value;

                tambahAbsen(namaScan, jabatanScan, waktuScan);
            } else {
                // Jika QR hanya berisi teks Nama saja
                document.getElementById('nama').value = decodedText;
                alert("Barcode terbaca: '" + decodedText + "'. Silakan pilih Jabatan secara manual lalu klik Kirim.");
            }
        }

        function onScanFailure(error) {
            // Diabaikan agar tidak memenuhi log console saat kamera mencari barcode
        }

        // Jalankan Scanner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: { width: 250, height: 250 } }, /* verbose= */ false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
